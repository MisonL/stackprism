name: 构建扩展并发布

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: 已存在的 release tag，留空则自动按 manifest.json 版本拼成 v{version}
        required: false
        type: string

permissions:
  contents: write

jobs:
  package:
    name: 打包浏览器扩展
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: 构建注入脚本
        run: pnpm run build:injected

      - name: 单元测试
        run: pnpm run test:unit

      - name: 类型检查（仓库脚本会刷新 dist）
        run: pnpm run typecheck

      - name: 文档构建
        run: pnpm run docs:build

      - name: 发布前刷新扩展 dist
        run: pnpm run build

      - name: 校验发布产物边界
        shell: bash
        run: |
          set -euo pipefail

          node --input-type=module <<'NODE'
          import { readdirSync, readFileSync, statSync } from 'node:fs'
          import { join, relative } from 'node:path'

          const root = 'dist'
          const manifest = JSON.parse(readFileSync(join(root, 'manifest.json'), 'utf8'))
          const failures = []
          const agentOnlySourceFiles = [
            'stackprism-bridge.mjs',
            'stackprism_bridge.py',
            'capture-store.mjs',
            'http-handlers.mjs',
            'http-server.mjs',
            'open-browser.mjs',
            'protocol.mjs',
            'security.mjs',
            'url-policy.mjs'
          ]
          const agentOnlyPathPatterns = [
            /(?:^|\/)agent-skill(?:\/|$)/,
            /(?:^|\/)docs\/superpowers(?:\/|$)/,
            /(?:^|\/)tests(?:\/|$)/
          ]

          if (Object.prototype.hasOwnProperty.call(manifest, 'externally_connectable')) {
            failures.push('dist/manifest.json must not expose externally_connectable')
          }

          for (const resource of manifest.web_accessible_resources || []) {
            for (const path of resource.resources || []) {
              if (
                agentOnlyPathPatterns.some(pattern => pattern.test(path)) ||
                agentOnlySourceFiles.some(file => path.includes(file)) ||
                path.includes('experience-profiler.iife.js')
              ) {
                failures.push(`web_accessible_resources exposes agent-only path: ${path}`)
              }
            }
          }

          const disallowed = [
            ...agentOnlyPathPatterns,
            /(?:^|\/)__pycache__(?:\/|$)/,
            /\.py[co]?$/,
            ...agentOnlySourceFiles.map(file => new RegExp(`${file.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}$`))
          ]

          const walk = dir => {
            for (const entry of readdirSync(dir)) {
              const full = join(dir, entry)
              const rel = relative(root, full)
              if (statSync(full).isDirectory()) {
                walk(full)
                continue
              }
              if (disallowed.some(pattern => pattern.test(rel))) {
                failures.push(`dist contains agent-only or test artifact: ${rel}`)
              }
            }
          }
          walk(root)

          if (failures.length) {
            for (const failure of failures) console.error(`::error::${failure}`)
            process.exit(1)
          }
          NODE

      - name: 读取版本号并校验
        id: meta
        shell: bash
        env:
          EVENT_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail

          version="$(node -p "require('./dist/manifest.json').version")"
          tag="${EVENT_TAG:-${INPUT_TAG:-}}"

          if [ -z "$tag" ]; then
            tag="v${version}"
          fi

          normalized_tag="${tag#v}"
          if [ "$normalized_tag" != "$version" ]; then
            echo "::error::Release tag $tag 与 dist/manifest.json 中的版本号 $version 不一致。"
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "zip_name=stackprism-v${version}.zip" >> "$GITHUB_OUTPUT"
          echo "crx_name=stackprism-v${version}.crx" >> "$GITHUB_OUTPUT"
          echo "xpi_name=stackprism-v${version}.xpi" >> "$GITHUB_OUTPUT"

      - name: 打包 zip
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          (
            cd dist
            zip -r "../release/${{ steps.meta.outputs.zip_name }}" .
          )
          sha256sum "release/${{ steps.meta.outputs.zip_name }}" > "release/${{ steps.meta.outputs.zip_name }}.sha256"

      - name: 打包 Firefox .xpi
        shell: bash
        run: |
          set -euo pipefail
          node build-scripts/package-firefox.mjs
          sha256sum "release/${{ steps.meta.outputs.xpi_name }}" > "release/${{ steps.meta.outputs.xpi_name }}.sha256"

      - name: 签名 crx
        id: crx
        shell: bash
        env:
          EXTENSION_PRIVATE_KEY: ${{ secrets.EXTENSION_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${EXTENSION_PRIVATE_KEY:-}" ]; then
            echo "::warning::secrets.EXTENSION_PRIVATE_KEY 未配置，跳过 crx 生成。zip 仍会上传。"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          printf '%s' "$EXTENSION_PRIVATE_KEY" > extension.pem
          npx --yes crx3 --keyPath extension.pem --crxPath "release/${{ steps.meta.outputs.crx_name }}" dist
          sha256sum "release/${{ steps.meta.outputs.crx_name }}" > "release/${{ steps.meta.outputs.crx_name }}.sha256"
          rm -f extension.pem
          echo "skipped=false" >> "$GITHUB_OUTPUT"

      - name: 上传产物到 release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          assets=(
            "release/${{ steps.meta.outputs.zip_name }}"
            "release/${{ steps.meta.outputs.zip_name }}.sha256"
            "release/${{ steps.meta.outputs.xpi_name }}"
            "release/${{ steps.meta.outputs.xpi_name }}.sha256"
          )
          if [ -f "release/${{ steps.meta.outputs.crx_name }}" ]; then
            assets+=(
              "release/${{ steps.meta.outputs.crx_name }}"
              "release/${{ steps.meta.outputs.crx_name }}.sha256"
            )
          fi
          gh release upload "${{ steps.meta.outputs.tag }}" "${assets[@]}" --clobber

      - name: 归档产物
        uses: actions/upload-artifact@v4
        with:
          name: stackprism-v${{ steps.meta.outputs.version }}
          path: release/
